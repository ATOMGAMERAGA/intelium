name: Build, Test, Release

on:
  push:
    branches:
      - main
      - 'claude/**'
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release:
        description: 'Create a GitHub release with the built jars'
        required: false
        default: 'true'

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  INTELIUM_VERSION: "1.2.1"

jobs:
  build:
    name: Build & test ${{ matrix.label }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: mc1.21.11
            java: '21'
            label: '1.21.11'
            jarname: 'Intelium-v1.2.1-1.21.11.jar'
          - target: mc26
            java: '25'
            label: '26.x'
            jarname: 'Intelium-v1.2.1-26.x.jar'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}
          check-latest: true

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x ./${{ matrix.target }}/gradlew

      - name: Build & test (${{ matrix.label }})
        run: |
          ./${{ matrix.target }}/gradlew -p ${{ matrix.target }} clean build \
            -PinteliumVersion="${INTELIUM_VERSION}" \
            --no-daemon --stacktrace

      - name: Collect the mod jar
        run: |
          mkdir -p dist
          SRC=$(ls ${{ matrix.target }}/build/libs/intelium-*.jar | grep -v sources | head -1)
          echo "Built: $SRC"
          cp "$SRC" "dist/${{ matrix.jarname }}"
          ls -la dist/

      - name: Upload test reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-reports-${{ matrix.target }}
          path: ${{ matrix.target }}/build/reports/tests/test/
          retention-days: 14

      - name: Upload jar artifact
        uses: actions/upload-artifact@v4
        with:
          name: jar-${{ matrix.target }}
          path: dist/${{ matrix.jarname }}
          retention-days: 90

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    # Only publish from main or a version tag. Pushes to claude/** branches still
    # run the build job above (real-environment validation) but do NOT release.
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all jar artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: jar-*
          path: dist
          merge-multiple: true

      - name: List release files
        run: ls -la dist/

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ env.INTELIUM_VERSION }}"
          name: "Intelium ${{ env.INTELIUM_VERSION }}"
          body: |
            ## Intelium ${{ env.INTELIUM_VERSION }}

            Two jars, one per Minecraft line. Download the one matching your version:

            | Jar | Minecraft | Java |
            |---|---|---|
            | `Intelium-v${{ env.INTELIUM_VERSION }}-1.21.11.jar` | 1.21.11 | 21 |
            | `Intelium-v${{ env.INTELIUM_VERSION }}-26.x.jar` | 26.1, 26.1.1, 26.1.2, 26.2 | 25 |

            Made by **ATOMLAND Studios** · <https://modrinth.com/mod/intelium-mod>

            ---

            ### Modrinth changelog (copy the block below)

            ````markdown
            ## English

            Polish release: five new real FPS levers, a smarter overlay, and important bug fixes. Supports Minecraft **1.21.11** and the **26.x** line (26.1 → 26.2, including the Vulkan renderer).

            ### New settings — a whole "GPU Savers" group
            Every option is a real, wired lever (no placebos), applied live and fully reversible:
            - **Clouds** (Don't Touch / Fast / Off) — clouds are a translucent layer redrawn every frame, pure overdraw on an iGPU.
            - **Fast Graphics** — forces the vanilla Graphics setting to Fast; one of the biggest single FPS wins on weak iGPUs.
            - **Disable Smooth Lighting** — skips per-vertex ambient occlusion during chunk meshing: cheaper chunk builds, fewer streaming hitches.
            - **Force VSync Off** — uncaps FPS from your display's refresh rate while Intelium is active.
            - **Max Render Distance** — caps render distance downward (never raises it); the most reliable FPS lever there is.
            - **Frame-time overlay line** — the FPS test overlay can now show current + average frame time in milliseconds (1.21.11 jar).

            ### Fixes
            - **Your settings are truly yours again:** captured originals are now persisted, so turning a tweak (or Intelium) off restores *your* values even across a game restart. Previously the forced values could end up saved into `options.txt`.
            - **The master switch is honoured at startup** — disabling Intelium no longer silently re-enables it on the next launch.
            - **A corrupted `intelium.json` can no longer crash the game** — bad configs fall back to defaults, saves are atomic (no half-written files), and hand-edited values are clamped to valid ranges.

            Two jars: `Intelium-v${{ env.INTELIUM_VERSION }}-1.21.11.jar` (Java 21) or `Intelium-v${{ env.INTELIUM_VERSION }}-26.x.jar` (Java 25). Full Türkçe and English localisation. Verified compatible with GPUTape and AsyncParticles.

            ## Türkçe (Turkish)

            Cila sürümü: beş yeni gerçek FPS kolu, daha akıllı bir overlay ve önemli hata düzeltmeleri. Minecraft **1.21.11** ve **26.x** serisi (26.1 → 26.2, Vulkan dahil) desteklenir.

            ### Yeni ayarlar — yepyeni bir "GPU Tasarrufları" grubu
            Her seçenek gerçek, bağlı bir koldur (placebo yok), canlı uygulanır ve tamamen geri alınabilir:
            - **Bulutlar** (Dokunma / Hızlı / Kapalı) — bulutlar her kare yeniden çizilen yarı saydam bir katmandır, iGPU'da saf overdraw.
            - **Hızlı Grafikler** — vanilla Grafik ayarını Hızlı'ya zorlar; zayıf iGPU'lardaki en büyük tekil FPS kazançlarından biri.
            - **Yumuşak Aydınlatmayı Kapat** — chunk meshing'deki köşe başına ambient occlusion'ı atlar: daha ucuz chunk build'leri, daha az takılma.
            - **VSync'i Kapat** — Intelium etkinken FPS'i ekranın yenileme hızından kurtarır.
            - **Maks Görüş Mesafesi** — görüş mesafesini yalnızca aşağı doğru sınırlar (asla yükseltmez); var olan en güvenilir FPS kolu.
            - **Kare süresi satırı** — FPS test overlay'i artık anlık + ortalama kare süresini milisaniye olarak gösterebilir (1.21.11 jar'ı).

            ### Düzeltmeler
            - **Ayarların artık gerçekten senin:** yakalanan orijinal değerler kalıcı hale getirildi; bir ayarı (veya Intelium'u) kapatmak, oyunu yeniden başlatsan bile *senin* değerlerini geri yükler. Önceden zorlanan değerler `options.txt`'ye kaydedilebiliyordu.
            - **Ana anahtar açılışta dikkate alınıyor** — Intelium'u kapatmak artık bir sonraki açılışta sessizce geri açılmasına yol açmıyor.
            - **Bozuk bir `intelium.json` artık oyunu çökertemez** — bozuk config varsayılanlara döner, kayıtlar atomiktir (yarım yazılmış dosya olmaz) ve elle düzenlenen değerler geçerli aralıklara sıkıştırılır.

            İki jar: `Intelium-v${{ env.INTELIUM_VERSION }}-1.21.11.jar` (Java 21) ya da `Intelium-v${{ env.INTELIUM_VERSION }}-26.x.jar` (Java 25). Tam Türkçe ve İngilizce yerelleştirme. GPUTape ve AsyncParticles ile uyumluluğu doğrulandı.
            ````
          files: |
            dist/Intelium-v${{ env.INTELIUM_VERSION }}-1.21.11.jar
            dist/Intelium-v${{ env.INTELIUM_VERSION }}-26.x.jar
          draft: false
          prerelease: false
          generate_release_notes: false
          fail_on_unmatched_files: true
