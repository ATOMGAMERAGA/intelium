name: Build, Test, Release

on:
  push:
    branches:
      - main
      - 'claude/**'
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release:
        description: 'Create a GitHub release with the built jars'
        required: false
        default: 'true'

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  INTELIUM_VERSION: "1.2.2"

jobs:
  build:
    name: Build & test ${{ matrix.label }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: mc1.21.11
            java: '21'
            label: '1.21.11'
            jarname: 'Intelium-v1.2.2-1.21.11.jar'
          - target: mc26
            java: '25'
            label: '26.x'
            jarname: 'Intelium-v1.2.2-26.x.jar'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}
          check-latest: true

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x ./${{ matrix.target }}/gradlew

      - name: Build & test (${{ matrix.label }})
        run: |
          ./${{ matrix.target }}/gradlew -p ${{ matrix.target }} clean build \
            -PinteliumVersion="${INTELIUM_VERSION}" \
            --no-daemon --stacktrace

      - name: Collect the mod jar
        run: |
          mkdir -p dist
          SRC=$(ls ${{ matrix.target }}/build/libs/intelium-*.jar | grep -v sources | head -1)
          echo "Built: $SRC"
          cp "$SRC" "dist/${{ matrix.jarname }}"
          ls -la dist/

      - name: Upload test reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-reports-${{ matrix.target }}
          path: ${{ matrix.target }}/build/reports/tests/test/
          retention-days: 14

      - name: Upload jar artifact
        uses: actions/upload-artifact@v4
        with:
          name: jar-${{ matrix.target }}
          path: dist/${{ matrix.jarname }}
          retention-days: 90

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    # Only publish from main or a version tag. Pushes to claude/** branches still
    # run the build job above (real-environment validation) but do NOT release.
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all jar artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: jar-*
          path: dist
          merge-multiple: true

      - name: List release files
        run: ls -la dist/

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ env.INTELIUM_VERSION }}"
          name: "Intelium ${{ env.INTELIUM_VERSION }}"
          body: |
            ## Intelium ${{ env.INTELIUM_VERSION }}

            Two jars, one per Minecraft line. Download the one matching your version:

            | Jar | Minecraft | Java |
            |---|---|---|
            | `Intelium-v${{ env.INTELIUM_VERSION }}-1.21.11.jar` | 1.21.11 | 21 |
            | `Intelium-v${{ env.INTELIUM_VERSION }}-26.x.jar` | 26.1, 26.1.1, 26.1.2, 26.2 | 25 |

            Made by **ATOMLAND Studios** · <https://modrinth.com/mod/intelium-mod>

            ---

            ### Modrinth changelog (copy the block below)

            ````markdown
            ## English

            **Adaptive Performance release** — Intelium now reacts to your FPS in real time instead of only applying static tweaks. Three new real levers (no placebos, applied live, fully reversible), built on the techniques proven by Dynamic FPS and the adaptive-render-distance family of mods. Supports Minecraft **1.21.11** and the **26.x** line (26.1 → 26.2, including the Vulkan renderer).

            ### New — "Adaptive Performance" group
            - **Adaptive Render Distance** — set an FPS target (30–120); when your FPS stays below it, Intelium steps the render distance down one chunk at a time, and steps it back up when there is sustained headroom. Hysteresis + hold timers mean a short dip (a GC pause, a chunk-build burst) never triggers a step, and it never goes below half your own setting. Your distance is restored the moment you turn it off.
            - **Background FPS Limit** — caps the frame rate while the game window is unfocused. On an iGPU this is a double win: background frames stop burning the shared CPU/GPU power budget, so the game also comes back cooler when you return. Your own FPS limit is restored the instant the window regains focus. Steps aside automatically when Dynamic FPS or FPS Reducer is installed.
            - **Max Simulation Distance** (GPU Savers) — caps the simulation distance downward, cutting the per-tick CPU cost in singleplayer; on power-shared iGPUs, a cooler CPU means faster frames.

            ### Why these work
            Render distance is the single most reliable FPS lever there is — but a static cap is either too tight on a quiet plain or too loose in a jungle village. The adaptive controller measures a 5-second rolling average and keeps the world as large as your machine can afford *right now*. The background limiter uses the same approach Dynamic FPS proved: frames nobody is looking at are pure waste — on Intel iGPUs they also steal power from the CPU.

            All existing levers (chunk-worker tuning, fast chunk loading, the GPU Savers group, live render tweaks) are unchanged and still capture & restore your original settings — even across a restart.

            Two jars: `Intelium-v${{ env.INTELIUM_VERSION }}-1.21.11.jar` (Java 21) or `Intelium-v${{ env.INTELIUM_VERSION }}-26.x.jar` (Java 25). Full Türkçe and English localisation. Verified compatible with GPUTape, AsyncParticles, Dynamic FPS and FPS Reducer.

            ## Türkçe (Turkish)

            **Uyarlanabilir Performans sürümü** — Intelium artık yalnızca statik ayarlar uygulamakla kalmıyor, FPS'ine gerçek zamanlı tepki veriyor. Üç yeni gerçek kol (placebo yok, canlı uygulanır, tamamen geri alınabilir); Dynamic FPS ve uyarlanabilir görüş mesafesi modlarının kanıtladığı tekniklerle. Minecraft **1.21.11** ve **26.x** serisi (26.1 → 26.2, Vulkan dahil) desteklenir.

            ### Yeni — "Uyarlanabilir Performans" grubu
            - **Uyarlanabilir Görüş Mesafesi** — bir FPS hedefi belirle (30–120); FPS'in bunun altında kaldığında Intelium görüş mesafesini her seferinde bir chunk düşürür, kalıcı alan açıldığında geri yükseltir. Histerezis + bekleme sayaçları sayesinde kısa bir düşüş (GC duraklaması, chunk-build patlaması) asla adım tetiklemez ve mesafe asla kendi ayarının yarısının altına inmez. Kapattığın an kendi mesafen geri yüklenir.
            - **Arka Plan FPS Sınırı** — oyun penceresi odak dışındayken kare hızını sınırlar. iGPU'da bu çifte kazançtır: arka plan kareleri paylaşılan CPU/GPU güç bütçesini yakmayı bırakır, oyuna döndüğünde makinen daha serindir. Pencere odağı geri kazandığı an kendi FPS sınırın geri yüklenir. Dynamic FPS veya FPS Reducer kuruluysa otomatik olarak kenara çekilir.
            - **Maks Simülasyon Mesafesi** (GPU Tasarrufları) — simülasyon mesafesini aşağı doğru sınırlar, tek oyunculuda tick başına CPU maliyetini keser; gücü paylaşan iGPU'larda daha serin CPU, daha hızlı kare demektir.

            ### Neden işe yarıyor
            Görüş mesafesi var olan en güvenilir FPS koludur — ama statik bir sınır ya sakin bir ovada gereksiz sıkı, ya da bir orman köyünde fazla gevşektir. Uyarlanabilir denetleyici 5 saniyelik kayan ortalamayı ölçer ve dünyayı makinenin *şu anda* kaldırabileceği kadar büyük tutar. Arka plan sınırlayıcı, Dynamic FPS'in kanıtladığı yaklaşımı kullanır: kimsenin bakmadığı kareler saf israftır — Intel iGPU'larda üstelik CPU'dan güç çalarlar.

            Var olan tüm kollar (chunk-worker ayarı, hızlı chunk yükleme, GPU Tasarrufları grubu, canlı render ayarları) değişmedi ve orijinal ayarlarını yakalayıp geri yüklemeye devam ediyor — yeniden başlatmalarda bile.

            İki jar: `Intelium-v${{ env.INTELIUM_VERSION }}-1.21.11.jar` (Java 21) ya da `Intelium-v${{ env.INTELIUM_VERSION }}-26.x.jar` (Java 25). Tam Türkçe ve İngilizce yerelleştirme. GPUTape, AsyncParticles, Dynamic FPS ve FPS Reducer ile uyumluluğu doğrulandı.
            ````
          files: |
            dist/Intelium-v${{ env.INTELIUM_VERSION }}-1.21.11.jar
            dist/Intelium-v${{ env.INTELIUM_VERSION }}-26.x.jar
          draft: false
          prerelease: false
          generate_release_notes: false
          fail_on_unmatched_files: true
