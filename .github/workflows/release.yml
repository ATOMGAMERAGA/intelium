name: Build, Test, Release

on:
  push:
    branches:
      - main
      - 'claude/**'
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release:
        description: 'Create a GitHub release with the built jars'
        required: false
        default: 'true'

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  INTELIUM_VERSION: "1.2.0"

jobs:
  build:
    name: Build & test ${{ matrix.label }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: mc1.21.11
            java: '21'
            label: '1.21.11'
            jarname: 'Intelium-v1.2.0-1.21.11.jar'
          - target: mc26
            java: '25'
            label: '26.x'
            jarname: 'Intelium-v1.2.0-26.x.jar'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}
          check-latest: true

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x ./${{ matrix.target }}/gradlew

      - name: Build & test (${{ matrix.label }})
        run: |
          ./${{ matrix.target }}/gradlew -p ${{ matrix.target }} clean build \
            -PinteliumVersion="${INTELIUM_VERSION}" \
            --no-daemon --stacktrace

      - name: Collect the mod jar
        run: |
          mkdir -p dist
          SRC=$(ls ${{ matrix.target }}/build/libs/intelium-*.jar | grep -v sources | head -1)
          echo "Built: $SRC"
          cp "$SRC" "dist/${{ matrix.jarname }}"
          ls -la dist/

      - name: Upload test reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-reports-${{ matrix.target }}
          path: ${{ matrix.target }}/build/reports/tests/test/
          retention-days: 14

      - name: Upload jar artifact
        uses: actions/upload-artifact@v4
        with:
          name: jar-${{ matrix.target }}
          path: dist/${{ matrix.jarname }}
          retention-days: 90

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    # Only publish from main or a version tag. Pushes to claude/** branches still
    # run the build job above (real-environment validation) but do NOT release.
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all jar artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: jar-*
          path: dist
          merge-multiple: true

      - name: List release files
        run: ls -la dist/

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ env.INTELIUM_VERSION }}"
          name: "Intelium ${{ env.INTELIUM_VERSION }}"
          body: |
            ## Intelium ${{ env.INTELIUM_VERSION }}

            Two jars, one per Minecraft line. Download the one matching your version:

            | Jar | Minecraft | Java |
            |---|---|---|
            | `Intelium-v${{ env.INTELIUM_VERSION }}-1.21.11.jar` | 1.21.11 | 21 |
            | `Intelium-v${{ env.INTELIUM_VERSION }}-26.x.jar` | 26.1, 26.1.1, 26.1.2, 26.2 | 25 |

            Made by **ATOMLAND Studios** · <https://modrinth.com/mod/intelium-mod>

            ---

            ### Modrinth changelog (copy the block below)

            ````markdown
            ## English

            Multi-version release: Intelium now supports Minecraft **1.21.11** and the **26.x** line (26.1, 26.1.1, 26.1.2, 26.2), including 26.2's new Vulkan renderer.

            - **Two jars, one per Minecraft line.** Pick `Intelium-v${{ env.INTELIUM_VERSION }}-1.21.11.jar` (Java 21) or `Intelium-v${{ env.INTELIUM_VERSION }}-26.x.jar` (Java 25). The 26.x jar runs on 26.1 → 26.2 and adapts to the Sodium version present.
            - **Built on the latest Sodium APIs** for each version (Sodium 0.8.x on 1.21.11, 0.8.x/0.9.x on the 26.x line) using official 26.x mappings.
            - **More FPS, safely:** generation- and profile-aware chunk-build worker count, fast chunk loading (Sodium defer-mode override), and live render tweaks (entity distance, particles, entity shadows, biome blend).
            - **Plays nice with GPU mods:** verified no conflict with GPUTape and AsyncParticles — Intelium never touches GL/Vulkan buffers, and it steps aside on the particle setting when AsyncParticles is installed.
            - **Languages:** full Türkçe and American English; any English variant and any other locale fall back to American English automatically.
            - Note: on 26.x, the movable FPS overlay and custom screens are temporarily omitted (Minecraft 26 reworked its GUI for Vulkan); the core optimizations and the Sodium settings page are fully functional.

            ## Türkçe (Turkish)

            Çoklu sürüm: Intelium artık Minecraft **1.21.11** ve **26.x** serisini (26.1, 26.1.1, 26.1.2, 26.2) destekliyor — 26.2'nin yeni Vulkan render motoru dahil.

            - **İki jar, her Minecraft serisi için bir tane.** `Intelium-v${{ env.INTELIUM_VERSION }}-1.21.11.jar` (Java 21) ya da `Intelium-v${{ env.INTELIUM_VERSION }}-26.x.jar` (Java 25) seç. 26.x jar'ı 26.1 → 26.2 arasında çalışır ve mevcut Sodium sürümüne uyum sağlar.
            - **Her sürüm için en güncel Sodium API'leri** kullanıldı (1.21.11'de Sodium 0.8.x, 26.x serisinde 0.8.x/0.9.x), 26.x için resmi eşlemelerle.
            - **Daha fazla FPS, güvenle:** nesle ve profile duyarlı chunk-build worker sayısı, hızlı chunk yükleme (Sodium defer-mode geçersiz kılma) ve canlı render ayarları (varlık mesafesi, parçacıklar, varlık gölgeleri, biyom karışımı).
            - **GPU modlarıyla uyumlu:** GPUTape ve AsyncParticles ile çakışma olmadığı doğrulandı — Intelium GL/Vulkan tamponlarına asla dokunmaz ve AsyncParticles kuruluyken parçacık ayarından çekilir.
            - **Diller:** tam Türkçe ve Amerikan İngilizcesi; herhangi bir İngilizce çeşidi ve diğer tüm diller otomatik olarak Amerikan İngilizcesine döner.
            - Not: 26.x'te taşınabilir FPS ekranı ve özel ekranlar geçici olarak yok (Minecraft 26, GUI'yi Vulkan için yeniledi); çekirdek optimizasyonlar ve Sodium ayar sayfası tam çalışır durumda.
            ````
          files: |
            dist/Intelium-v${{ env.INTELIUM_VERSION }}-1.21.11.jar
            dist/Intelium-v${{ env.INTELIUM_VERSION }}-26.x.jar
          draft: false
          prerelease: false
          generate_release_notes: false
          fail_on_unmatched_files: true
